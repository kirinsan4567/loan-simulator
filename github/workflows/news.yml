name: Update News

on:
  schedule:
    - cron: "0 * * * *"   # 1時間ごとでもOK
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm install

      - run: node scripts/fetch-news.js

      - name: Commit news.json
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add news.json
          git commit -m "update news" || exit 0
          git push
