name: News

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      # Node.js 24を明示的にインストールし、キャッシュを使わない設定にすることで
      # 依存関係の不整合を回避します
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      
      - run: npm install --no-package-lock
      - run: node scripts/fetch-news.js
        
      - uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
