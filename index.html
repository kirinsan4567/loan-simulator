<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>住宅ローン返済シミュレーター（画像再現版）</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  :root {
    --bg: #f8f7f4;
    --surface: #ffffff;
    --border: #e2e0db;
    --text: #1a1a1a;
    --sub: #6b6861;
    --accent: #e84040;
    --accent-light: rgba(232,64,64,0.12);
    --orange: #f97316;
    --orange-light: rgba(249,115,22,0.12);
    --gray: #9a9590;
    --chart-gray: #b0b0b0;
    --chart-red: #ff9999;
    --radius: 12px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 18px 32px;
    display: flex;
    align-items: baseline;
    gap: 12px;
  }
  header h1 { font-size: 20px; font-weight: 700; letter-spacing: -0.3px; }
  header span { font-size: 13px; color: var(--sub); }

  .layout {
    display: grid;
    grid-template-columns: 360px 1fr;
    min-height: calc(100vh - 57px);
  }

  .panel {
    background: var(--surface);
    border-right: 1px solid var(--border);
    padding: 22px 18px;
    overflow-y: auto;
  }
  .section-title {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.08em;
    color: var(--sub);
    text-transform: uppercase;
    margin-bottom: 12px;
    margin-top: 22px;
    padding-top: 18px;
    border-top: 1px solid var(--border);
  }
  .section-title:first-child { margin-top: 0; border-top: none; padding-top: 0; }

  .field { margin-bottom: 12px; }
  .field label {
    display: block;
    font-size: 12px;
    color: var(--sub);
    margin-bottom: 4px;
    font-weight: 500;
  }
  .field input[type="number"],
  .field input[type="month"],
  .field select {
    width: 100%;
    padding: 8px 11px;
    border: 1px solid var(--border);
    border-radius: 8px;
    font-size: 14px;
    background: var(--bg);
    color: var(--text);
    outline: none;
    transition: border-color 0.15s;
  }
  .field input:focus, .field select:focus { border-color: var(--accent); }

  .range-wrap { position: relative; }
  .range-val {
    position: absolute; right: 0; top: 0;
    font-size: 13px; font-weight: 600; color: var(--accent);
  }
  input[type="range"] { width: 100%; accent-color: var(--accent); margin-top: 8px; }

  .toggle-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 12px;
    border: 1px solid var(--border);
    border-radius: 10px;
    margin-bottom: 8px;
    background: var(--bg);
    cursor: pointer;
    transition: border-color 0.15s, background 0.15s;
  }
  .toggle-row:hover { border-color: var(--orange); background: var(--orange-light); }
  .toggle-row.active { border-color: var(--orange); background: var(--orange-light); }
  .toggle-label { font-size: 13px; font-weight: 600; color: var(--text); }
  .toggle-desc { font-size: 10px; color: var(--sub); margin-top: 1px; }
  .toggle-switch {
    position: relative;
    width: 36px; height: 20px;
    flex-shrink: 0;
  }
  .toggle-switch input { opacity: 0; width: 0; height: 0; }
  .slider {
    position: absolute; inset: 0;
    background: #ccc; border-radius: 20px;
    transition: background 0.2s;
    cursor: pointer;
  }
  .slider::before {
    content: '';
    position: absolute;
    width: 14px; height: 14px;
    left: 3px; top: 3px;
    background: #fff;
    border-radius: 50%;
    transition: transform 0.2s;
  }
  input:checked + .slider { background: var(--orange); }
  input:checked + .slider::before { transform: translateX(16px); }
  input:disabled + .slider { opacity: 0.4; cursor: not-allowed; }

  .rate-steps { display: flex; flex-direction: column; gap: 7px; margin-top: 6px; }
  .rate-row {
    display: grid;
    grid-template-columns: 1.2fr 1.1fr 1fr auto;
    gap: 6px;
    align-items: flex-end;
    background: #fdfdfd;
    border: 1px solid var(--border);
    padding: 10px;
    border-radius: 8px;
  }
  .rate-row input {
    width: 100%; padding: 6px 8px;
    border: 1px solid var(--border);
    border-radius: 7px; font-size: 13px;
    background: var(--bg);
  }
  .calc-rate-box {
    font-size: 13px; font-weight: 700; color: var(--accent);
    padding: 6px 4px; text-align: center; background: #fff1f1;
    border-radius: 6px; border: 1px dashed rgba(232,64,64,0.3);
  }
  .btn-del {
    background: none; border: 1px solid var(--border);
    border-radius: 6px; width: 28px; height: 28px;
    cursor: pointer; font-size: 14px; color: var(--sub);
    display: flex; align-items: center; justify-content: center;
    transition: background 0.1s;
  }
  .btn-del:hover { background: #fee2e2; color: var(--accent); }
  .btn-add {
    margin-top: 6px; width: 100%; padding: 7px;
    border: 1px dashed var(--border); border-radius: 8px;
    background: none; font-size: 13px; color: var(--sub);
    cursor: pointer; transition: all 0.15s;
  }
  .btn-add:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-light); }

  .btn-calc {
    width: 100%; padding: 12px;
    background: var(--accent); color: #fff;
    border: none; border-radius: 10px;
    font-size: 15px; font-weight: 700;
    cursor: pointer; letter-spacing: 0.03em;
    transition: opacity 0.15s;
  }
  .btn-calc:hover { opacity: 0.88; }
  .btn-calc.top-btn { margin-top: 10px; margin-bottom: 5px; }

  .results {
    padding: 24px;
    display: flex;
    flex-direction: column;
    gap: 24px;
    overflow-y: auto;
  }
  .chart-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 18px 20px;
  }
  .chart-box h3 {
    font-size: 16px; font-weight: 700;
    margin-bottom: 10px; color: var(--text);
  }
  canvas { max-height: 240px; width: 100% !important; }

  @media (max-width: 900px) {
    .layout { grid-template-columns: 1fr; }
    .panel { border-right: none; border-bottom: 1px solid var(--border); }
  }
</style>
</head>
<body>
<header>
  <h1>住宅ローン返済シミュレーター</h1>
  <span>画像グラフ再現・積み上げ面チャート仕様</span>
</header>

<div class="layout">
  <aside class="panel">
    <div class="section-title">ローン基本情報</div>
    <div class="field">
      <label>借入金額（万円）</label>
      <input type="number" id="principal" value="5000" min="0" max="1000000" step="100" onchange="calculate()">
    </div>
    <div class="field">
      <label>借入開始年月（契約）</label>
      <input type="month" id="startDate" value="2023-10" onchange="onBaseDataChange()">
    </div>
    <div class="field">
      <label>当初契約金利（%）</label>
      <input type="number" id="initRate" value="0.35" step="0.01" min="0" onchange="onBaseDataChange()">
    </div>
    <div class="field">
      <label>返済期間（年）</label>
      <div class="range-wrap">
        <span class="range-val" id="termVal">35年</span>
        <input type="range" id="term" min="5" max="50" value="35" step="1"
               oninput="document.getElementById('termVal').textContent=this.value+'年'" onchange="calculate()">
      </div>
    </div>
    <div class="field">
      <label>返済方法</label>
      <select id="repayType" onchange="calculate()">
        <option value="equal_payment">元利均等返済</option>
        <option value="equal_principal">元金均等返済</option>
      </select>
    </div>

    <button class="btn-calc top-btn" onclick="calculate()">シミュレーション実行</button>

    <div class="section-title">返済ルール設定</div>
    <div class="toggle-row" id="row5yr" onclick="toggle5yr()">
      <div>
        <div class="toggle-label">5年ルール</div>
      </div>
      <div class="toggle-switch" onclick="event.stopPropagation()">
        <input type="checkbox" id="rule5yr" onchange="onRule5yrChange(); calculate();" checked>
        <span class="slider"></span>
      </div>
    </div>

    <div class="toggle-row" id="row125" onclick="toggle125()">
      <div>
        <div class="toggle-label">125%ルール</div>
      </div>
      <div class="toggle-switch" onclick="event.stopPropagation()">
        <input type="checkbox" id="rule125" onchange="onRule125Change(); calculate();" checked>
        <span class="slider"></span>
      </div>
    </div>

    <div class="section-title">金利見直し・適用タイミング</div>
    <div class="field">
      <label>金利見直し月</label>
      <select id="reviewMonths" onchange="calculate()">
        <option value="4,10">毎年の4月・10月</option>
        <option value="1,7">毎年の1月・7月</option>
        <option value="all">毎月見直し</option>
      </select>
    </div>
    <div class="field">
      <label>新金利の適用タイミング（遅延月数）</label>
      <div style="display:flex; align-items:center; gap:8px;">
        <input type="number" id="applyDelay" value="3" min="0" max="12" step="1" style="width:70px;" onchange="calculate()">
        <span>ヶ月後から適用</span>
      </div>
    </div>

    <div class="section-title">利上げシナリオ</div>
    <div class="rate-steps" id="rateSteps"></div>
    <button class="btn-add" onclick="addRateStep()">＋ 金利変更イベントを追加</button>
  </aside>

  <main class="results" id="results">
    <div class="chart-box">
      <h3>変動金利（適用金利）の想定推移</h3>
      <canvas id="chart1"></canvas>
    </div>
    <div class="chart-box">
      <h3>毎月の返済額推移</h3>
      <canvas id="chart2"></canvas>
    </div>
    <div class="chart-box">
      <h3>ローン残高推移</h3>
      <canvas id="chart3"></canvas>
    </div>
    <div class="chart-box">
      <h3>ローン総支払額</h3>
      <canvas id="chart4"></canvas>
    </div>
  </main>
</div>

<script>
const BASE_YM = "2026-06";
let eventSteps = [
  { ym: "2024-03", bump: 0.25 }, 
  { ym: "2024-07", bump: 0.25 }, 
  { ym: "2025-01", bump: 0.25 }, 
  { ym: "2025-12", bump: 0.25 }, 
  { ym: "2026-12", bump: 0.25 }, 
  { ym: "2027-06", bump: 0.25 }, 
  { ym: "2027-12", bump: 0.25 }, 
  { ym: "2028-12", bump: 0.25 }  
];

function onBaseDataChange() { renderSteps(); calculate(); }

function renderSteps() {
  const cont = document.getElementById('rateSteps');
  if (!cont) return;
  cont.innerHTML = '';
  const initRate = parseFloat(document.getElementById('initRate').value) || 0;
  let runningRate = initRate;
  eventSteps.sort((a,b) => a.ym.localeCompare(b.ym));
  eventSteps.forEach((s, i) => {
    runningRate += s.bump;
    const row = document.createElement('div');
    row.className = 'rate-row';
    row.innerHTML = `
      <div><input type="month" value="${s.ym}" onchange="eventSteps[${i}].ym=this.value; renderSteps(); calculate();"></div>
      <div><input type="number" value="${s.bump}" step="0.01" onchange="eventSteps[${i}].bump=parseFloat(this.value)||0; renderSteps(); calculate();"></div>
      <div><div class="calc-rate-box">${runningRate.toFixed(2)}%</div></div>
      <button class="btn-del" onclick="removeStep(${i})">×</button>
    `;
    cont.appendChild(row);
  });
}

function getDiffMonths(start, current) {
  if (!start || !current) return 0;
  const [sy, sm] = start.split('-').map(Number);
  const [cy, cm] = current.split('-').map(Number);
  return (cy - sy) * 12 + (cm - sm);
}

function addRateStep() {
  let lastYm = "2029-01";
  if (eventSteps.length > 0) {
    const [y, m] = eventSteps[eventSteps.length - 1].ym.split('-').map(Number);
    const d = new Date(y, m + 5, 1);
    lastYm = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
  }
  eventSteps.push({ ym: lastYm, bump: 0.25 });
  renderSteps();
  calculate();
}
function removeStep(i) { eventSteps.splice(i, 1); renderSteps(); calculate(); }
function toggle5yr() { const cb = document.getElementById('rule5yr'); if (cb) { cb.checked = !cb.checked; onRule5yrChange(); calculate(); } }
function toggle125() { const cb5 = document.getElementById('rule5yr'); if (cb5 && !cb5.checked) return; const cb = document.getElementById('rule125'); if (cb) { cb.checked = !cb.checked; onRule125Change(); calculate(); } }
function onRule5yrChange() {
  const cb5 = document.getElementById('rule5yr'); if (!cb5) return;
  document.getElementById('row5yr').classList.toggle('active', cb5.checked);
  const cb125 = document.getElementById('rule125');
  if (cb125) { cb125.disabled = !cb5.checked; if (!cb5.checked) cb125.checked = false; onRule125Change(); }
}
function onRule125Change() { const cb125 = document.getElementById('rule125'); if (cb125) document.getElementById('row125').classList.toggle('active', cb125.checked && !cb125.disabled); }

function getRateAtMonth(startYM, targetMonthIndex) {
  const initRate = parseFloat(document.getElementById('initRate').value) || 0;
  const delay = parseInt(document.getElementById('applyDelay').value) || 0;
  const reviewMode = document.getElementById('reviewMonths').value;
  if (!startYM) return initRate / 100 / 12;
  const [sy, sm] = startYM.split('-').map(Number);
  const currentMonthNum = ((sm - 1 + targetMonthIndex) % 12) + 1;
  let activeBumpSum = 0;
  for (let i = 0; i < eventSteps.length; i++) {
    const s = eventSteps[i];
    const eventMonthIndex = getDiffMonths(startYM, s.ym);
    if (targetMonthIndex >= eventMonthIndex + delay) {
      if (reviewMode === 'all') { activeBumpSum += s.bump; }
      else { if (reviewMode.split(',').map(Number).includes(currentMonthNum) || targetMonthIndex > eventMonthIndex + delay) activeBumpSum += s.bump; }
    }
  }
  return Math.max(0, initRate + activeBumpSum) / 100 / 12;
}

let activeCharts = {};

function calculate() {
  const principal = parseFloat(document.getElementById('principal').value) * 10000;
  const term = parseInt(document.getElementById('term').value);
  const repayType = document.getElementById('repayType').value;
  const startYM = document.getElementById('startDate').value;
  const use5yr = document.getElementById('rule5yr').checked;
  const use125 = document.getElementById('rule125').checked;
  const totalMonths = term * 12;

  if (!principal || !term || !startYM) return;

  const labels = [];
  const rateData = [];
  
  const principalPayData = [];
  const interestPayData = [];
  
  const principalBalanceData = [];
  const unpaidInterestData = [];
  
  const cumPrincipalData = [];
  const cumInterestData = [];

  let balance = principal;
  let unpaidInterest = 0;
  let currentPayment = 0;
  let cumPrincipal = 0;
  let cumInterest = 0;

  const r0 = getRateAtMonth(startYM, 0);
  if (repayType === 'equal_payment') {
    currentPayment = r0 === 0 ? (balance / totalMonths) : (balance * r0) / (1 - Math.pow(1 + r0, -totalMonths));
  }

  for (let m = 0; m < totalMonths; m++) {
    const monthlyRate = getRateAtMonth(startYM, m);
    const [y, mm] = startYM.split('-').map(Number);
    const d = new Date(y, mm - 1 + m, 1);
    
    // X軸のラベルフォーマットを画像に合わせる (例: 2025/01)
    labels.push(`${d.getFullYear()}/${String(d.getMonth() + 1).padStart(2, '0')}`);
    rateData.push(+(monthlyRate * 12 * 100).toFixed(4));

    const remainingMonths = totalMonths - m;

    // 変動金利 正式検証ロジック（2033年据え置き挙動）
    if (repayType === 'equal_payment' && use5yr && m > 0 && m % 60 === 0) {
      const effectiveBalance = balance + unpaidInterest;
      let nextPayment = monthlyRate === 0 ? (effectiveBalance / remainingMonths) : (effectiveBalance * monthlyRate) / (1 - Math.pow(1 + monthlyRate, -remainingMonths));
      if (use125) {
        const upperLimit = currentPayment * 1.25;
        if (nextPayment > upperLimit) nextPayment = upperLimit;
      }
      currentPayment = nextPayment;
    }

    let interestPart = balance * monthlyRate;
    let principalPart = 0;
    let payment = 0;

    if (repayType === 'equal_payment') {
      if (!use5yr) {
        currentPayment = monthlyRate === 0 ? (balance / remainingMonths) : (balance * monthlyRate) / (1 - Math.pow(1 + monthlyRate, -remainingMonths));
      }
      payment = currentPayment;

      if (payment <= interestPart) {
        unpaidInterest += (interestPart - payment);
        interestPart = payment;
        principalPart = 0;
      } else {
        const surplus = payment - interestPart;
        if (unpaidInterest > 0) {
          const clearUnpaid = Math.min(surplus, unpaidInterest);
          unpaidInterest -= clearUnpaid;
          principalPart = surplus - clearUnpaid;
        } else {
          principalPart = surplus;
        }
      }
    } else {
      principalPart = principal / totalMonths;
      payment = principalPart + interestPart;
    }

    if (balance <= principalPart) {
      principalPart = balance;
      payment = principalPart + interestPart;
      balance = 0;
    } else {
      balance -= principalPart;
    }

    cumPrincipal += principalPart;
    cumInterest += interestPart;

    principalPayData.push(Math.round(principalPart));
    interestPayData.push(Math.round(interestPart));
    
    principalBalanceData.push(Math.round(balance));
    unpaidInterestData.push(Math.round(unpaidInterest));
    
    cumPrincipalData.push(Math.round(cumPrincipal));
    cumInterestData.push(Math.round(cumInterest));

    if (balance <= 0 && unpaidInterest <= 0) break;
  }

  drawAllCharts(labels, {
    rateData, principalPayData, interestPayData,
    principalBalanceData, unpaidInterestData, cumPrincipalData, cumInterestData
  });
}

function drawAllCharts(labels, d) {
  // 古いグラフを破棄
  Object.values(activeCharts).forEach(c => { if (c) c.destroy(); });
  activeCharts = {};

  const commonOptions = {
    responsive: true,
    maintainAspectRatio: false,
    plugins: { legend: { display: true, position: 'top' } },
    scales: {
      x: { ticks: { maxTicksLimit: 10, font: { size: 10 } }, grid: { display: false } },
      y: { ticks: { font: { size: 10 } } }
    },
    elements: { point: { radius: 0 } }
  };

  // 1. 変動金利の想定推移 (折れ線 ＋ 塗りつぶし)
  activeCharts.c1 = new Chart(document.getElementById('chart1'), {
    type: 'line',
    data: {
      labels: labels,
      datasets: [{
        label: '適用金利', data: d.rateData,
        borderColor: '#e84040', backgroundColor: 'rgba(232,64,64,0.2)',
        fill: true, borderWidth: 2, tension: 0
      }]
    },
    options: {
      ...commonOptions,
      plugins: { legend: { display: false } },
      scales: { ...commonOptions.scales, y: { min: 0, max: 4, ticks: { callback: v => v.toFixed(2) + '%' } } }
    }
  });

  // 2. 毎月の返済額推移 (積み上げ面グラフ)
  activeCharts.c2 = new Chart(document.getElementById('chart2'), {
    type: 'line',
    data: {
      labels: labels,
      datasets: [
        { label: '元本充当額', data: d.principalPayData, backgroundColor: 'var(--chart-gray)', borderColor: 'rgba(0,0,0,0.1)', fill: 'origin', borderWidth: 0.5 },
        { label: '利息充当額', data: d.interestPayData, backgroundColor: 'var(--chart-red)', borderColor: '#e84040', fill: 'stack', borderWidth: 1.5 }
      ]
    },
    options: {
      ...commonOptions,
      scales: { ...commonOptions.scales, x: { ...commonOptions.scales.x }, y: { stacked: true, min: 0, ticks: { callback: v => v.toLocaleString() } } }
    }
  });

  // 3. ローン残高推移 (積み上げ面グラフ)
  activeCharts.c3 = new Chart(document.getElementById('chart3'), {
    type: 'line',
    data: {
      labels: labels,
      datasets: [
        { label: '元本残高', data: d.principalBalanceData, backgroundColor: 'var(--chart-gray)', borderColor: 'rgba(0,0,0,0.1)', fill: 'origin', borderWidth: 0.5 },
        { label: '残利息額 (未払い利息)', data: d.unpaidInterestData, backgroundColor: 'var(--chart-red)', borderColor: '#e84040', fill: 'stack', borderWidth: 1.5 }
      ]
    },
    options: {
      ...commonOptions,
      scales: { ...commonOptions.scales, y: { stacked: true, min: 0, ticks: { callback: v => v.toLocaleString() } } }
    }
  });

  // 4. ローン総支払額 (積み上げ面グラフ)
  activeCharts.c4 = new Chart(document.getElementById('chart4'), {
    type: 'line',
    data: {
      labels: labels,
      datasets: [
        { label: '総支払額（元本）', data: d.cumPrincipalData, backgroundColor: 'var(--chart-gray)', borderColor: 'rgba(0,0,0,0.1)', fill: 'origin', borderWidth: 0.5 },
        { label: '総支払額（利息）', data: d.cumInterestData, backgroundColor: 'var(--chart-red)', borderColor: '#e84040', fill: 'stack', borderWidth: 1.5 }
      ]
    },
    options: {
      ...commonOptions,
      scales: { ...commonOptions.scales, y: { stacked: true, min: 0, ticks: { callback: v => v.toLocaleString() } } }
    }
  });
}

window.onload = function() {
  onRule5yrChange();
  renderSteps();
  calculate();
};
</script>
</body>
</html>
