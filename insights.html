<!-- insights.html -->

<!DOCTYPE html>

<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KIRIN Insights</title>

<style>
body{
  margin:0;
  font-family:-apple-system,sans-serif;
  background:#fff;
  color:#222;
}

.header{
  background:#fff;
  border-bottom:1px solid #eee;
  padding:20px 40px;
}

.nav{
  display:flex;
  gap:24px;
  margin-top:10px;
}

.nav a{
  text-decoration:none;
  color:#444;
}

.container{
  max-width:1400px;
  margin:auto;
  padding:30px;
}

.layout{
  display:grid;
  grid-template-columns:3fr 1fr;
  gap:40px;
}

.section{
  margin-bottom:50px;
}

.section h2{
  border-bottom:2px solid #eee;
  padding-bottom:10px;
}

.news-item{
  padding:12px 0;
  border-bottom:1px solid #eee;
}

.pick{
  background:#FFF8F0;
  border-left:5px solid #E8821E;
  padding:20px;
  margin-bottom:15px;
}

.sidebar{
  position:sticky;
  top:20px;
}

.x-card{
  border:1px solid #eee;
  border-radius:10px;
  padding:15px;
  margin-bottom:15px;
}

.card{
  border:1px solid #eee;
  border-radius:12px;
  padding:20px;
  margin-bottom:15px;
}
</style>

</head>

<body>

<div class="header">

<h1>KIRIN Insights</h1>

<div class="nav">
<a href="insights.html">ホーム</a>
<a href="reports.html">分析レポート</a>
<a href="columns.html">コラム</a>
</div>

</div>

<div class="container">

<div class="layout">

<main>

<section class="section">
<h2>📰 最新ニュース</h2>

<div id="news-container">
読み込み中...
</div>

</section>

<section class="section">

<h2>⭐ KIRIN Picks</h2>

<div class="pick">
日銀利上げが住宅ローンへ与える影響
</div>

<div class="pick">
借入8000万円世帯への影響分析
</div>

</section>

<section class="section">

<h2>📊 分析レポート</h2>

<div class="card">
借入8000万円で政策金利1.5%
</div>

<div class="card">
借入1億円で政策金利2.0%
</div>

</section>

<section class="section">

<h2>✍️ コラム</h2>

<div class="card">
5年ルールとは？
</div>

<div class="card">
125%ルールとは？
</div>

</section>

</main>

<aside class="sidebar">

<h2>𝕏 厳選X投稿</h2>

<div class="x-card">
埋め込みポスト①
</div>

<div class="x-card">
埋め込みポスト②
</div>

<div class="x-card">
埋め込みポスト③
</div>

</aside>

</div>

</div>

<script>

async function loadNews(){

const res = await fetch("news.json");
const news = await res.json();

const container =
document.getElementById("news-container");

container.innerHTML="";

news.forEach(item=>{

container.innerHTML += `
<div class="news-item">
<strong>${item.category}</strong><br>
${item.title}
</div>
`;

});

}

loadNews();

</script>

</body>
</html>
