<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>不動産・経済ニュースインサイト</title>
    <style>
        body { font-family: sans-serif; line-height: 1.6; padding: 20px; color: #333; max-width: 800px; margin: 0 auto; }
        h1 { border-bottom: 2px solid #333; padding-bottom: 10px; }
        .tag { font-weight: bold; }
    </style>
</head>
<body>

    <h1>マーケット・インサイト</h1>
    <div id="news-container">ニュースを読み込んでいます...</div>

    <script>
      fetch('data/news.json?cache_buster=' + new Date().getTime())
        .then(res => res.json())
        .then(data => {
          // 1. 指定されたキーワードフィルタリング
          const keywords = ["日銀", "金融政策", "金利", "地価", "不動産", "住宅ローン", "マンション", "建設", "株価", "円安", "円高", "ドル円", "為替", "日経平均", "デベロッパー", "建設", "建築", "住宅"];
          const filteredNews = data.items.filter(item => 
            keywords.some(keyword => item.title.includes(keyword))
          );

          // 2. 日付ごとのグルーピング
          const now = new Date();
          const groups = {
            "今日のニュース": [],
            "昨日のニュース": [],
            "一昨日のニュース": [],
            "今週のニュース": [],
            "先週のニュース": [],
            "それ以前": []
          };

          filteredNews.forEach(item => {
            const itemDate = new Date(item.date);
            const diffDays = Math.floor((now - itemDate) / (1000 * 60 * 60 * 24));

            if (diffDays === 0) groups["今日のニュース"].push(item);
            else if (diffDays === 1) groups["昨日のニュース"].push(item);
            else if (diffDays === 2) groups["一昨日のニュース"].push(item);
            else if (diffDays <= 7) groups["今週のニュース"].push(item);
            else if (diffDays <= 14) groups["先週のニュース"].push(item);
            else groups["それ以前"].push(item);
          });

          // 3. HTMLへの書き出し
          let html = "";
          for (const [title, items] of Object.entries(groups)) {
            if (items.length === 0) continue;

            html += `<h3 style="margin-top:25px; border-bottom: 2px solid #333;">${title} (${items.length}件)</h3>`;
            items.forEach(item => {
              html += `
                <div class="news-row" style="margin-bottom: 8px;">
                  <span class="tag" style="background:#e0f7fa; padding:2px 6px; border-radius:4px; color:#006064; font-size:0.85em;">${item.tag}</span>
                  <a href="${item.link}" target="_blank" style="text-decoration:none; color:#333;">${item.title}</a>
                </div>`;
            });
          }
          document.getElementById("news-container").innerHTML = html;
        })
        .catch(err => {
          document.getElementById("news-container").innerHTML = "ニュースの読み込みに失敗しました。";
        });
    </script>
</body>
</html>
