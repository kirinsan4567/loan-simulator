<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Kirin Insights</title>

<style>
body {
  font-family: Arial, sans-serif;
  margin: 0;
  background: #f7f7f7;
}

/* ヘッダー */
header {
  position: sticky;
  top: 0;
  background: white;
  padding: 12px 16px;
  border-bottom: 1px solid #ddd;
  z-index: 10;
}

/* メインレイアウト */
.container {
  display: flex;
}

/* 左メイン */
.main {
  flex: 1;
  padding: 16px;
}

/* 右サイド */
.sidebar {
  width: 300px;
  height: 100vh;
  overflow-y: auto;
  background: #fff;
  border-left: 1px solid #ddd;
  padding: 10px;
}

/* 最新ニュース */
#featured-title {
  font-size: 20px;
  font-weight: bold;
  transition: all 0.3s ease;
}

/* ニュース */
.news-item {
  padding: 10px;
  border-bottom: 1px solid #eee;
  transition: all 0.3s ease;
}

.news-item.active {
  background: #fff7ed;
  font-weight: bold;
}

.news-title {
  font-size: 14px;
}

.news-category {
  font-size: 12px;
  color: gray;
}
</style>
</head>

<body>

<header>
  <div id="featured-title">読み込み中...</div>
  <div id="featured-summary">最新ニュースを取得しています</div>
</header>

<div class="container">

  <!-- メイン -->
  <div class="main">
    <h2>News Feed</h2>
    <div id="news-container">Loading...</div>
  </div>

  <!-- サイドバー -->
  <div class="sidebar">
    <h3>Live Panel</h3>
    <div id="side-news">読み込み中...</div>
  </div>

</div>

<script>
async function loadNews(){

  const container = document.getElementById("news-container");
  const side = document.getElementById("side-news");

  try {

    container.style.opacity = 0.4;

    const res = await fetch("./news.json?ts=" + Date.now());
    const news = await res.json();

    if(!Array.isArray(news) || news.length === 0){
      container.innerHTML = "ニュース準備中";
      return;
    }

    /* 最新ニュース */
    const featured = document.getElementById("featured-title");

    featured.style.transform = "scale(1.03)";
    featured.textContent = news[0].title;

    document.getElementById("featured-summary").textContent =
      "市場ニュースをリアルタイム更新中";

    setTimeout(() => {
      featured.style.transform = "scale(1)";
    }, 300);

    /* メイン一覧 */
    container.innerHTML = "";

    news.forEach((item, i) => {

      container.innerHTML += `
        <div class="news-item ${i === 0 ? "active" : ""}">
          <div class="news-title">${item.title}</div>
          <div class="news-category">${item.category || ""}</div>
        </div>
      `;

    });

    /* サイドバー（簡易ライブ） */
    side.innerHTML = "";

    news.slice(0, 10).forEach(item => {

      side.innerHTML += `
        <div class="news-item">
          <div class="news-title">${item.title}</div>
        </div>
      `;

    });

    /* フェードイン */
    requestAnimationFrame(() => {
      container.style.transition = "opacity 0.4s ease";
      container.style.opacity = 1;
    });

  } catch(e){
    console.error(e);
    container.innerHTML = "取得エラー";
  }
}

/* 初回 */
loadNews();

/* 3分ごと更新（世界の株価風） */
setInterval(loadNews, 180000);

</script>

</body>
</html>
