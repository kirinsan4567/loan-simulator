<style>
    /* テーブル全体の幅を固定 */
    table { width: 100%; border-collapse: collapse; table-layout: fixed; margin-bottom: 30px; }
    th, td { padding: 10px; border-bottom: 1px solid #eee; text-align: left; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; }
    
    /* 列の幅指定 */
    .col-tag { width: 90px; }
    .col-title { width: auto; }
    .col-date { width: 100px; font-size: 0.85em; color: #666; }
    .col-source { width: 120px; font-size: 0.85em; color: #555; }
    
    /* タグの色設定 */
    .tag { padding: 3px 8px; border-radius: 4px; font-size: 0.75em; font-weight: bold; }
    .tag-finance { background: #e0f7fa; color: #006064; }
    .tag-market { background: #fff3e0; color: #bf360c; }
    .tag-dev { background: #e8f5e9; color: #1b5e20; }
    .tag-other { background: #f5f5f5; color: #616161; }
    h3 { margin-top: 30px; border-left: 4px solid #333; padding-left: 10px; }
</style>

<div id="news-container">読み込み中...</div>

<script>
  const tagClassMap = {
      "金融・政策": "tag-finance",
      "不動産市場": "tag-market",
      "開発・建設": "tag-dev",
      "その他": "tag-other"
  };

  fetch('data/news.json?t=' + new Date().getTime())
    .then(res => res.json())
    .then(data => {
      const now = new Date();
      // 今日の日付を0時にリセットして比較用にする
      const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
      
      const groups = { "今日のニュース": [], "今週のニュース(今日を除く)": [], "先週のニュース": [] };

      data.items.forEach(item => {
        const itemDate = new Date(item.date);
        const itemDay = new Date(itemDate.getFullYear(), itemDate.getMonth(), itemDate.getDate());
        const diffDays = Math.floor((today - itemDay) / (1000 * 60 * 60 * 24));
        
        if (diffDays === 0) groups["今日のニュース"].push(item);
        else if (diffDays > 0 && diffDays <= 7) groups["今週のニュース(今日を除く)"].push(item);
        else if (diffDays > 7 && diffDays <= 14) groups["先週のニュース"].push(item);
      });

      let containerHtml = "";
      for (let groupName in groups) {
        if (groups[groupName].length === 0) continue;
        
        containerHtml += `<h3>${groupName}</h3><table><thead><tr><th class='col-tag'>区分</th><th class='col-title'>タイトル</th><th class='col-date'>日付</th><th class='col-source'>配信元</th></tr></thead><tbody>`;
        
        groups[groupName].forEach(item => {
          const tagClass = tagClassMap[item.tag] || "tag-other";
          const d = new Date(item.date);
          const dateStr = (d.getMonth() + 1) + "/" + d.getDate();
          
          containerHtml += `<tr>
            <td><span class="tag ${tagClass}">${item.tag}</span></td>
            <td class="col-title"><a href="${item.link}" target="_blank" style="text-decoration:none; color:#333;">${item.title}</a></td>
            <td class="col-date">${dateStr}</td>
            <td class="col-source">${item.source}</td>
          </tr>`;
        });
        containerHtml += "</tbody></table>";
      }
      
      document.getElementById("news-container").innerHTML = containerHtml || "ニュースはありません。";
    })
    .catch(err => {
      document.getElementById("news-container").innerHTML = "ニュースの読み込みに失敗しました。";
    });
</script>
