<div class="container">
  <main class="left-col">
    <section><h2>Top Pics</h2>...手動エリア...</section>
    <section><h2>ニュース</h2><div id="news-list"></div></section>
    <section><h2>コラム</h2>...手動エリア...</section>
    <section><h2>レポート</h2>...手動エリア...</section>
  </main>

  <aside class="right-col">
    <h2>厳選X投稿</h2>
    </aside>
</div>

<script>
  // ニュースの読み込みと表示
  fetch('data/news.json')
    .then(r => r.json())
    .then(data => {
      const list = document.getElementById('news-list');
      list.innerHTML = data.map(item => `
        <div class="news-row">
          <a href="${item.link}">${item.title}</a>
          <span class="tag">${item.tag}</span>
        </div>
      `).join('');
    });
</script>
