<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="site.css">
    <style>
        .container { display: grid; grid-template-columns: 1fr 300px; gap: 30px; max-width: 1100px; margin: auto; padding: 20px; }
        .x-card { border: 1px solid #ddd; padding: 15px; border-radius: 8px; margin-bottom: 10px; font-size: 14px; }
        .news-row { margin-bottom: 10px; padding-bottom: 5px; border-bottom: 1px solid #eee; }
        .tag { font-size: 10px; background: #eee; padding: 2px 5px; border-radius: 3px; }
    </style>
</head>
<body>
    <header>/* 共通ヘッダー */</header>
    <div class="container">
        <main>
            <section><h2>Top Pics</h2>...内容...</section>
            <section><h2>ニュース</h2><div id="news-list">読み込み中...</div></section>
            <section><h2>コラム</h2>...内容...</section>
            <section><h2>レポート</h2>...内容...</section>
        </main>
        <aside>
            <h2>厳選X投稿</h2>
            <div class="x-card"><a href="URL">投稿1の内容</a></div>
            <div class="x-card"><a href="URL">投稿2の内容</a></div>
        </aside>
    </div>
    <script>
fetch("data/news.json")
  .then(res => res.json())
  .then(data => {
    // 1. データの中身を取り出す（以前のデータ構造にも対応させる）
    const allNews = data.items || data; 
    
    // 2. 表示したいキーワード（ここを調整して精度を高めます）
    const keywords = ["日銀", "金融政策", "金利", "地価", "不動産", "住宅ローン", "マンション", "建設", "株価",　"円安",　"円高", "ドル円", "為替", "日経平均", "デベロッパー", "建設", "建築", "住宅"];
    
    // 3. 不動産関連ニュースのみに絞り込む
    const filteredNews = allNews.filter(item => 
      keywords.some(keyword => item.title.includes(keyword))
    );

    // 4. HTMLに表示する
    const container = document.getElementById("news-list");
    if (!container) return;

    if (filteredNews.length === 0) {
      container.innerHTML = "<p>該当するニュースは見つかりませんでした。</p>";
    } else {
      container.innerHTML = filteredNews.map(item => `
        <div class="news-row" style="margin-bottom: 10px; border-bottom: 1px solid #ccc;">
          <a href="${item.link}" target="_blank" style="text-decoration: none; color: #333;">${item.title}</a>
          <span style="font-size: 0.8em; color: #666;">[${item.tag}]</span>
        </div>
      `).join('');
    }
  })
  .catch(err => {
    console.error("ニュースの読み込みに失敗しました:", err);
  });

　　</script>
</body>
</html>
