<style>
    /* テーブル全体の幅を固定し、列ごとの幅を調整 */
    table { width: 100%; border-collapse: collapse; table-layout: fixed; margin-top: 20px; }
    th, td { padding: 12px; border-bottom: 1px solid #eee; text-align: left; overflow: hidden; }
    
    /* 列の幅指定 */
    .col-tag { width: 100px; }      /* カテゴリ */
    .col-title { width: auto; }     /* タイトル（余白をすべて使う） */
    .col-date { width: 90px; font-size: 0.85em; color: #666; } /* 日付 */
    .col-source { width: 120px; font-size: 0.85em; color: #555; } /* ソース */
    
    .tag { padding: 3px 8px; border-radius: 4px; font-size: 0.75em; font-weight: bold; }
    .tag-finance { background: #e0f7fa; color: #006064; }
    .tag-market { background: #fff3e0; color: #bf360c; }
    .tag-dev { background: #e8f5e9; color: #1b5e20; }
    .tag-other { background: #f5f5f5; color: #616161; }
</style>

<div id="news-container"></div>

<script>
  // カテゴリごとの色設定
  const tagClassMap = {
      "金融・政策": "tag-finance",
      "不動産市場": "tag-market",
      "開発・建設": "tag-dev",
      "その他": "tag-other"
  };

  fetch('data/news.json?cache_buster=' + new Date().getTime())
    .then(res => res.json())
    .then(data => {
      let html = "<table><thead><tr><th class='col-tag'>区分</th><th class='col-title'>タイトル</th><th class='col-date'>日付</th><th class='col-source'>配信元</th></tr></thead><tbody>";
      
      data.items.forEach(item => {
        const tagClass = tagClassMap[item.tag] || "tag-other";
        html += `<tr>
          <td><span class="tag ${tagClass}">${item.tag}</span></td>
          <td class="col-title"><a href="${item.link}" target="_blank" style="text-decoration:none; color:#333;">${item.title}</a></td>
          <td class="col-date">${item.date}</td>
          <td class="col-source">${item.source}</td>
        </tr>`;
      });
      
      html += "</tbody></table>";
      document.getElementById("news-container").innerHTML = html;
    })
    .catch(err => {
      document.getElementById("news-container").innerHTML = "ニュースの読み込みに失敗しました。";
    });
</script>
