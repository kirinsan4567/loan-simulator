<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Kirin Insights</title>

<style>
body {
  font-family: Arial, sans-serif;
  margin: 0;
  background: #f6f7f9;
}

header {
  position: sticky;
  top: 0;
  background: white;
  padding: 12px 16px;
  border-bottom: 1px solid #ddd;
  z-index: 10;
}

.container {
  display: flex;
}

.main {
  flex: 1;
  padding: 16px;
}

.sidebar {
  width: 300px;
  height: 100vh;
  overflow-y: auto;
  background: #fff;
  border-left: 1px solid #ddd;
  padding: 10px;
}

#featured-title {
  font-size: 20px;
  font-weight: bold;
  transition: all 0.3s ease;
}

.news-item {
  padding: 10px;
  border-bottom: 1px solid #eee;
}

.news-item.active {
  background: #fff7e6;
  font-weight: bold;
}

.news-title {
  font-size: 14px;
}

.news-category {
  font-size: 12px;
  color: gray;
}

/* ティッカー */
#ticker {
  background: black;
  color: white;
  padding: 6px;
  white-space: nowrap;
  overflow: hidden;
}
</style>
</head>

<body>

<header>
  <div id="featured-title">Loading...</div>
  <div id="featured-summary">ニュース取得中</div>
</header>

<div id="ticker">Loading...</div>

<div class="container">

  <div class="main">
    <h2>News Feed</h2>
    <div id="news-container">Loading...</div>
  </div>

  <div class="sidebar">
    <h3>Stored News</h3>
    <div id="side-container"></div>
  </div>

</div>

<script>

let newsStore = [];

async function loadNews(){

  try {

    const res = await fetch("./news.json?ts=" + Date.now());
    const news = await res.json();

    if(!Array.isArray(news)) return;

    // ストック追加（重複防止）
    news.forEach(item => {

      if(!newsStore.find(n => n.title === item.title)){
        newsStore.unshift(item);
      }

    });

    if(newsStore.length > 50){
      newsStore = newsStore.slice(0, 50);
    }

    render();

  } catch(e){
    console.error(e);
  }
}

function render(){

  const container = document.getElementById("news-container");
  const side = document.getElementById("side-container");

  // 最新
  if(newsStore[0]){
    document.getElementById("featured-title").textContent =
      newsStore[0].title;
  }

  document.getElementById("featured-summary").textContent =
    "ストリーミング更新中";

  // メイン一覧（最新順）
  container.innerHTML = "";
  newsStore.forEach((item, i) => {

    container.innerHTML += `
      <div class="news-item ${i === 0 ? "active" : ""}">
        <div class="news-title">${item.title}</div>
      </div>
    `;

  });

  // サイド（ストック）
  side.innerHTML = "";
  newsStore.slice(0, 20).forEach(item => {

    side.innerHTML += `
      <div class="news-item">
        ${item.title}
      </div>
    `;

  });

  // ティッカー（世界の株価風）
  document.getElementById("ticker").innerHTML =
    newsStore.slice(0, 10)
      .map(n => `【${n.title}】`)
      .join(" ");
}

// 初回
loadNews();

// 3分ごと更新（データ追加）
setInterval(loadNews, 180000);

</script>

</body>
</html>
