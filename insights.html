<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>不動産ニュース一覧</title>
  <style>
    body { font-family: "Helvetica Neue", Arial, sans-serif; padding: 20px; background: #f9f9f9; }
    #news-container { max-width: 800px; margin: 0 auto; background: #fff; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
    
    .news-row {
      display: flex; align-items: center; gap: 12px; margin-bottom: 10px;
      white-space: nowrap; overflow: hidden;
    }
    .tag {
      padding: 3px 10px; border-radius: 4px; font-size: 0.75em; font-weight: bold;
      min-width: 80px; text-align: center; flex-shrink: 0;
    }
    .news-title {
      text-decoration: none; color: #333; font-size: 0.95em;
      overflow: hidden; text-overflow: ellipsis;
    }
    .news-title:hover { text-decoration: underline; }

    /* カテゴリカラー */
    .tag-finance { background: #e0f7fa; color: #006064; }
    .tag-market { background: #fff3e0; color: #bf360c; }
    .tag-dev { background: #e8f5e9; color: #1b5e20; }
  </style>
</head>
<body>

<div id="news-container"></div>

<script>
  // サンプルデータ：実際の運用ではJSONから読み込んでください
  const items = [
    { title: "日銀、追加利上げの可能性を示唆", link: "#", tag: "金融・政策" },
    { title: "港区の高級マンション価格が過去最高", link: "#", tag: "不動産市場" },
    { title: "品川駅前、トヨタ本社移転と再開発の全貌", link: "#", tag: "開発・建設" }
  ];

  const tagClassMap = { "金融・政策": "tag-finance", "不動産市場": "tag-market", "開発・建設": "tag-dev" };

  const container = document.getElementById('news-container');
  container.innerHTML = items.map(item => `
    <div class="news-row">
      <span class="tag ${tagClassMap[item.tag] || ''}">${item.tag}</span>
      <a href="${item.link}" target="_blank" class="news-title">${item.title}</a>
    </div>
  `).join('');
</script>
</body>
</html>
